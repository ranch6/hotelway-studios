<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotelway Studios</title>
<meta name="description" content="Hotelway Studios — faceless POV hospitality content. Portfolio in progress.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --linen: #faf7f1;
    --linen-deep: #f3eee4;
    --stone-soft: #cfc8bb;
    --ink: #2b2721;
    --ink-soft: #6b6357;
    --magenta: #c9407e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--linen);
    color: var(--ink);
    font-family: 'Inter', -apple-system, sans-serif;
    font-weight: 300;
    overflow: hidden;
    display: flex; flex-direction: column;
  }

  .corner { position: fixed; z-index: 5; font-size: 0.7rem; letter-spacing: 0.26em; text-transform: uppercase; }
  .corner a { color: inherit; text-decoration: none; }
  .corner-tl { top: 34px; left: 40px; font-family: 'Cormorant Garamond', serif; font-size: 1.05rem; letter-spacing: 0.3em; }
  .corner-tr { top: 36px; right: 40px; text-align: right; color: var(--ink-soft); line-height: 2; }

  /* ---------- deck ---------- */
  .stage {
    flex: 1; position: relative;
    perspective: 1400px; perspective-origin: 50% 50%;
    display: flex; align-items: center; justify-content: center;
    min-height: 0;
  }
  .card {
    position: absolute; left: 50%; top: 50%;
    width: min(240px, 22vw); aspect-ratio: 4 / 5;
    margin: calc(min(240px, 22vw) * -0.625) 0 0 calc(min(240px, 22vw) * -0.5);
    transform-style: preserve-3d;
    will-change: transform;
    cursor: pointer;
    transition: box-shadow 0.4s;
    box-shadow: 0 18px 50px rgba(43, 39, 33, 0.18);
    background: #fff;
  }
  .card img { width: 100%; height: 100%; object-fit: cover; display: block; pointer-events: none; }
  .card.blank {
    background: var(--linen);
    border: 1px solid var(--stone-soft);
    display: flex; align-items: center; justify-content: center; text-align: center;
  }
  .card.blank span {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    color: var(--ink-soft); font-size: 0.95rem; line-height: 1.8; padding: 14px;
  }

  /* ---------- footer ---------- */
  .foot {
    position: relative; z-index: 5;
    padding: 0 24px 46px; text-align: center;
  }
  .foot .label {
    font-size: 0.66rem; letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--ink-soft); margin-bottom: 20px;
  }
  .access { display: inline-flex; align-items: baseline; gap: 26px; border-bottom: 1px solid var(--stone-soft); padding-bottom: 10px; }
  .access input {
    border: none; outline: none; background: transparent;
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 1.15rem; color: var(--ink); width: min(300px, 56vw);
  }
  .access input::placeholder { color: var(--stone-soft); }
  .access button {
    border: none; background: none; cursor: pointer;
    font-family: 'Inter', sans-serif; font-size: 0.7rem; letter-spacing: 0.3em;
    text-transform: uppercase; color: var(--ink); padding: 0;
    transition: color 0.3s;
  }
  .access button:hover { color: var(--magenta); }
  .enter {
    display: inline-block; margin-top: 26px;
    font-size: 0.66rem; letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--ink-soft); text-decoration: none; transition: color 0.3s;
  }
  .enter:hover { color: var(--magenta); }

  @media (max-width: 640px) {
    .corner-tl { left: 22px; }
    .corner-tr { right: 22px; }
    .card { width: 34vw; margin: calc(34vw * -0.625) 0 0 calc(34vw * -0.5); }
  }
</style>
</head>
<body>

<div class="corner corner-tl">HOTELWAY&nbsp;STUDIOS</div>
<div class="corner corner-tr">Portfolio in progress<br>New York</div>

<div class="stage" id="stage">
  <a class="card" href="studio.html"><img src="assets/tile-arrival.svg" alt="Arrival — illustrated door"></a>
  <a class="card" href="studio.html"><img src="assets/cover-room.jpg" alt="Teaser still — hotel room"></a>
  <a class="card" href="studio.html"><img src="assets/tile-corridor.svg" alt="Corridor illustration"></a>
  <a class="card" href="studio.html"><img src="assets/cover-terrace.jpg" alt="Teaser still — terrace"></a>
  <a class="card" href="studio.html"><img src="assets/tile-morning.svg" alt="Morning coffee illustration"></a>
  <a class="card blank" href="studio.html"><span>no. 07<br>first location study<br>— coming soon —</span></a>
  <a class="card" href="studio.html"><img src="assets/tile-room.svg" alt="Room illustration"></a>
  <a class="card" href="studio.html"><img src="assets/cover-dome.jpg" alt="Teaser still — golden dome"></a>
  <a class="card" href="studio.html"><img src="assets/tile-lobby.svg" alt="Lobby illustration"></a>
  <a class="card" href="studio.html"><img src="assets/tile-view.svg" alt="View illustration"></a>
</div>

<div class="foot">
  <div class="label">Collaborations &amp; early access</div>
  <form class="access" id="access">
    <input type="email" id="email" placeholder="email address" autocomplete="email">
    <button type="submit">Join</button>
  </form>
  <br>
  <a class="enter" href="studio.html">Enter the studio &rarr;</a>
</div>

<script>
  // Coverflow deck: cards drift right-to-left on a shallow 3D arc, wrapping
  // around. Hovering pauses the drift and straightens the hovered card.
  const cards = [...document.querySelectorAll('.card')];
  const N = cards.length;
  let offset = 0;                 // continuous position, in card-units
  let paused = false;
  let hovered = null;
  let last = performance.now();

  const SPEED = 0.14;             // cards per second
  function cardWidth() { return Math.min(240, innerWidth * (innerWidth <= 640 ? 0.34 : 0.22)); }

  function layout() {
    const now = performance.now();
    const dt = Math.min((now - last) / 1000, 0.1);
    last = now;
    if (!paused) offset = (offset + SPEED * dt) % N;

    const spacing = cardWidth() * 1.18;
    const half = N / 2;
    cards.forEach((card, i) => {
      // signed distance from center, wrapped to [-N/2, N/2)
      let d = (i - offset + half) % N;
      if (d < 0) d += N;
      d -= half;

      const straighten = card === hovered;
      const x = d * spacing;
      const rot = straighten ? 0 : Math.max(-52, Math.min(52, -d * 16));
      const z = straighten ? 130 : -Math.abs(d) * 55;
      const scale = straighten ? 1.13 : 1;
      const fade = Math.max(0, 1 - Math.max(0, Math.abs(d) - half + 1.6) / 1.6);

      card.style.transform =
        `translate3d(${x}px, 0, ${z}px) rotateY(${rot}deg) scale(${scale})`;
      card.style.opacity = fade.toFixed(3);
      card.style.zIndex = straighten ? 99 : Math.round(50 - Math.abs(d) * 10);
      card.style.boxShadow = straighten
        ? '0 30px 70px rgba(43,39,33,0.30)'
        : '0 18px 50px rgba(43,39,33,0.18)';
    });
  }
  // Timer-driven (not rAF): some embedded viewers never tick
  // requestAnimationFrame, which would freeze the deck entirely.
  setInterval(layout, 33);
  layout();

  cards.forEach(card => {
    card.addEventListener('mouseenter', () => { hovered = card; paused = true; });
    card.addEventListener('mouseleave', () => { hovered = null; paused = false; });
  });

  document.getElementById('access').addEventListener('submit', (e) => {
    e.preventDefault();
    const v = document.getElementById('email').value.trim();
    const subject = encodeURIComponent('Hotelway Studios — early access');
    const body = encodeURIComponent(v ? `Please add ${v} to the list.` : 'Please add me to the list.');
    location.href = `mailto:hotelwaystudios@gmail.com?subject=${subject}&body=${body}`;
  });
</script>

</body>
</html>
