<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotelway Studios</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%235A6B4D'/%3E%3Cpath d='M20 52L20 30Q20 18 32 18Q44 18 44 30L44 52Z' fill='%23faf7f1'/%3E%3C/svg%3E">
<meta property="og:title" content="Hotelway Studios">
<meta property="og:description" content="Faceless POV hospitality content — cinematic photo and short-form video for hotels and stays. Portfolio in progress.">
<meta property="og:type" content="website">
<!-- TODO once the domain is live: <meta property="og:image" content="https://YOURDOMAIN/assets/cover-room.jpg"> -->
<meta name="description" content="Hotelway Studios — faceless POV hospitality content. Portfolio in progress.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --linen: #FBF7EB;
    --linen-deep: #F2EBD5;
    --stone-soft: #DCD3B4;
    --ink: #2C2F26;
    --ink-soft: #6A6D57;
    --gold: #B98A2F;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--linen);
    color: var(--ink);
    font-family: 'Inter', -apple-system, sans-serif;
    font-weight: 300;
    overflow: hidden;
    display: flex; flex-direction: column;
  }

  .corner { position: fixed; z-index: 5; font-size: 0.7rem; letter-spacing: 0.26em; text-transform: uppercase; }
  .corner a { color: inherit; text-decoration: none; }
  .corner-tl { top: 34px; left: 40px; font-family: 'Cormorant Garamond', serif; font-size: 1.05rem; letter-spacing: 0.3em; }
  .corner-tr { top: 36px; right: 40px; text-align: right; color: var(--ink-soft); line-height: 2; }

  /* ---------- deck ---------- */
  .stage {
    flex: 1; position: relative;
    perspective: 1400px; perspective-origin: 50% 50%;
    display: flex; align-items: center; justify-content: center;
    min-height: 0;
    cursor: grab; touch-action: none; user-select: none; -webkit-user-select: none;
  }
  .stage.dragging { cursor: grabbing; }
  .card {
    position: absolute; left: 50%; top: 50%;
    width: min(240px, 22vw); aspect-ratio: 4 / 5;
    margin: calc(min(240px, 22vw) * -0.625) 0 0 calc(min(240px, 22vw) * -0.5);
    transform-style: preserve-3d;
    will-change: transform;
    cursor: pointer;
    transition: box-shadow 0.4s;
    box-shadow: 0 18px 50px rgba(44, 47, 38, 0.18);
    background: #fff;
  }
  .card img, .card video { width: 100%; height: 100%; object-fit: cover; display: block; pointer-events: none; }
  .card { -webkit-user-drag: none; }
  .card.blank {
    background: var(--linen);
    border: 1px solid var(--stone-soft);
    display: flex; align-items: center; justify-content: center; text-align: center;
  }
  .card.blank span {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    color: var(--ink-soft); font-size: 0.95rem; line-height: 1.8; padding: 14px;
  }

  /* ---------- footer ---------- */
  .foot {
    position: relative; z-index: 5;
    padding: 0 24px 46px; text-align: center;
  }
  .foot .label {
    font-size: 0.66rem; letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--ink-soft); margin-bottom: 20px;
  }
  .access { display: inline-flex; align-items: baseline; gap: 26px; border-bottom: 1px solid var(--stone-soft); padding-bottom: 10px; }
  .access input {
    border: none; outline: none; background: transparent;
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 1.15rem; color: var(--ink); width: min(300px, 56vw);
  }
  .access input::placeholder { color: var(--stone-soft); }
  .access button {
    border: none; background: none; cursor: pointer;
    font-family: 'Inter', sans-serif; font-size: 0.7rem; letter-spacing: 0.3em;
    text-transform: uppercase; color: var(--ink); padding: 0;
    transition: color 0.3s;
  }
  .access button:hover { color: var(--gold); }
  .enter {
    display: inline-block; margin-top: 26px;
    font-size: 0.66rem; letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--ink-soft); text-decoration: none; transition: color 0.3s;
  }
  .enter:hover { color: var(--gold); }
  .joined {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 1.2rem; color: var(--ink);
  }
  .access-err {
    display: block; margin-top: 12px; font-size: 0.72rem;
    letter-spacing: 0.1em; color: var(--gold);
  }

  /* Post-join transition veil: "now onto the studio…" then studio.html */
  .veil {
    position: fixed; inset: 0; z-index: 99;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 22px;
    background: color-mix(in srgb, var(--linen) 97%, transparent);
    backdrop-filter: blur(6px);
    opacity: 0; pointer-events: none; transition: opacity 0.7s ease;
  }
  .veil.show { opacity: 1; pointer-events: auto; }
  .veil .veil-line {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: clamp(1.5rem, 3.4vw, 2.2rem); color: var(--ink);
  }
  .veil .veil-bar { width: 150px; height: 1px; background: var(--stone-soft); overflow: hidden; }
  .veil .veil-bar i { display: block; height: 100%; width: 0; background: var(--gold); }
  .veil.show .veil-bar i { animation: veil-fill 3s linear forwards; }
  @keyframes veil-fill { from { width: 0; } to { width: 100%; } }

  @media (max-width: 640px) {
    .corner-tl { left: 22px; }
    .corner-tr { right: 22px; top: 72px; }
    .card { width: 34vw; margin: calc(34vw * -0.625) 0 0 calc(34vw * -0.5); }
  }
</style>
</head>
<body>

<div class="corner corner-tl">HOTELWAY&nbsp;STUDIOS</div>
<div class="corner corner-tr">Portfolio in progress<br>New York</div>

<div class="stage" id="stage"></div>

<div class="foot">
  <div class="label">Collaborations &amp; early access</div>
  <form class="access" id="access">
    <input type="email" id="email" placeholder="email address" autocomplete="email">
    <button type="submit">Join</button>
  </form>
  <br>
  <a class="enter" href="studio.html">Enter the studio &rarr;</a>
  <a class="enter" style="margin-left: 34px;" href="inquire.html">Inquiries &rarr;</a>
</div>

<div class="veil" id="veil" aria-hidden="true">
  <span class="veil-line">now onto the studio&hellip;</span>
  <span class="veil-bar"><i></i></span>
</div>

<script src="assets/media.js"></script>
<script>
  // Deck cards come from assets/media.js (the media board) — edit imagery
  // there, not here. Rendered before the deck script reads .card below.
  document.getElementById('stage').innerHTML = window.SITE_MEDIA.coverDeck.map(c =>
    c.comingSoon
      ? `<a class="card blank" href="studio.html"><span>${c.comingSoon}</span></a>`
      : `<a class="card" href="studio.html">${c.video
          ? `<video src="${c.src}"${c.poster ? ` poster="${c.poster}"` : ''} autoplay muted loop playsinline></video>`
          : `<img src="${c.src}" alt="${c.alt || ''}">`}</a>`
  ).join('');
</script>
<script>
  // Coverflow deck: cards drift right-to-left on a shallow 3D arc, wrapping
  // around. Hovering pauses the drift and straightens the hovered card.
  const cards = [...document.querySelectorAll('.card')];
  const N = cards.length;
  let offset = 0;                 // continuous position, in card-units
  let paused = false;
  let hovered = null;
  let last = performance.now();

  // Respect reduced-motion preferences: the deck holds still (drag still works).
  const SPEED = matchMedia('(prefers-reduced-motion: reduce)').matches ? 0 : 0.14;  // cards per second
  function cardWidth() {
    // Hidden/unsized frames can report width 0 — fall back so the deck
    // never collapses to a single stack.
    const w = innerWidth || document.documentElement.clientWidth || 1200;
    return Math.min(240, w * (w <= 640 ? 0.34 : 0.22));
  }

  function layout() {
    const now = performance.now();
    const dt = Math.min((now - last) / 1000, 0.1);
    last = now;
    if (!paused) offset = (offset + SPEED * dt) % N;

    const spacing = cardWidth() * 1.18;
    const half = N / 2;
    cards.forEach((card, i) => {
      // signed distance from center, wrapped to [-N/2, N/2)
      let d = (i - offset + half) % N;
      if (d < 0) d += N;
      d -= half;

      const straighten = card === hovered;
      const x = d * spacing;
      const rot = straighten ? 0 : Math.max(-52, Math.min(52, -d * 16));
      const z = straighten ? 130 : -Math.abs(d) * 55;
      const scale = straighten ? 1.13 : 1;
      const fade = Math.max(0, 1 - Math.max(0, Math.abs(d) - half + 1.6) / 1.6);

      card.style.transform =
        `translate3d(${x}px, 0, ${z}px) rotateY(${rot}deg) scale(${scale})`;
      card.style.opacity = fade.toFixed(3);
      card.style.zIndex = straighten ? 99 : Math.round(50 - Math.abs(d) * 10);
      card.style.boxShadow = straighten
        ? '0 30px 70px rgba(44,47,38,0.30)'
        : '0 18px 50px rgba(44,47,38,0.18)';
    });
  }
  // Timer-driven (not rAF): some embedded viewers never tick
  // requestAnimationFrame, which would freeze the deck entirely.
  setInterval(layout, 33);
  layout();

  cards.forEach(card => {
    card.addEventListener('mouseenter', () => { hovered = card; paused = true; });
    card.addEventListener('mouseleave', () => { hovered = null; if (!dragging) paused = false; });
  });

  // Drag-to-scrub (pointer events cover both touch and mouse).
  const stage = document.getElementById('stage');
  let dragging = false, dragMoved = 0, lastX = 0, resumeTimer = null;
  stage.addEventListener('pointerdown', (e) => {
    dragging = true; dragMoved = 0; lastX = e.clientX;
    paused = true; clearTimeout(resumeTimer);
    stage.classList.add('dragging');
  });
  window.addEventListener('pointermove', (e) => {
    if (!dragging) return;
    const dx = e.clientX - lastX; lastX = e.clientX;
    dragMoved += Math.abs(dx);
    const spacing = cardWidth() * 1.18;
    offset = (((offset - dx / spacing) % N) + N) % N;
  });
  window.addEventListener('pointerup', () => {
    if (!dragging) return;
    dragging = false;
    stage.classList.remove('dragging');
    resumeTimer = setTimeout(() => { if (!hovered) paused = false; }, 900);
  });
  // A drag shouldn't count as a click on a card link.
  stage.addEventListener('click', (e) => {
    if (dragMoved > 8) { e.preventDefault(); e.stopPropagation(); }
  }, true);

  // Early-access list capture. JOIN_ENDPOINT accepts either:
  //   - a Formspree form URL  (https://formspree.io/f/XXXXYYYY), or
  //   - a Google Apps Script web-app URL (https://script.google.com/...)
  //     that appends the email to a Google Sheet — see DEPLOY.md for both.
  // Until one is set, it falls back to opening a pre-filled Gmail draft.
  const JOIN_ENDPOINT = 'https://formspree.io/f/YOUR_JOIN_FORM_ID';
  const accessForm = document.getElementById('access');

  // "Subscribed! Stay tuned." → veil "now onto the studio…" → studio.html.
  function joinSucceeded() {
    accessForm.outerHTML = '<p class="joined">Subscribed! Stay tuned.</p>';
    setTimeout(() => {
      const veil = document.getElementById('veil');
      veil.classList.add('show');
      veil.setAttribute('aria-hidden', 'false');
      setTimeout(() => { location.href = 'studio.html'; }, 3000);
    }, 1100);
  }

  accessForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const input = document.getElementById('email');
    const v = input.value.trim();
    if (!v || !input.checkValidity()) { input.reportValidity(); return; }
    if (JOIN_ENDPOINT.includes('YOUR_JOIN_FORM_ID')) {
      // No list endpoint configured yet: open a pre-filled Gmail draft in a
      // new tab so the address still reaches the studio, then continue the
      // subscribed → studio transition here.
      const subject = encodeURIComponent('Hotelway Studios — early access');
      const body = encodeURIComponent(`Please add ${v} to the list.`);
      window.open(`https://mail.google.com/mail/?view=cm&fs=1&to=hotelwaystudios@gmail.com&su=${subject}&body=${body}`, '_blank');
      joinSucceeded();
      return;
    }
    const btn = accessForm.querySelector('button');
    btn.textContent = '…';
    try {
      // Apps Script web apps can't answer CORS preflights, so send those a
      // simple no-cors POST (opaque response = assumed delivered).
      const isAppsScript = JOIN_ENDPOINT.includes('script.google.com');
      const res = await fetch(JOIN_ENDPOINT, isAppsScript
        ? { method: 'POST', mode: 'no-cors', body: JSON.stringify({ email: v }) }
        : {
            method: 'POST',
            headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: v, _subject: 'Hotelway — early access signup' })
          });
      if (!res.ok && res.type !== 'opaque') throw new Error();
      joinSucceeded();
    } catch {
      btn.textContent = 'Join';
      if (!document.querySelector('.access-err')) {
        const err = document.createElement('span');
        err.className = 'access-err';
        err.textContent = 'Something went wrong — email us at hotelwaystudios@gmail.com';
        accessForm.after(err);
      }
    }
  });
</script>

</body>
</html>
